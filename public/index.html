<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#060b18" />
  <meta name="description" content="Student Activity Platform - Centralized Digital Records" />
  <title>Student Activity Platform</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- SAP Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%231e3a8a'/><stop offset='100%25' stop-color='%237c3aed'/></linearGradient></defs><circle cx='50' cy='50' r='48' fill='url(%23g)'/><polygon points='50,15 85,32 50,49 15,32' fill='%2360a5fa'/><rect x='47' y='49' width='6' height='16' fill='%2360a5fa' rx='2'/><ellipse cx='50' cy='65' rx='13' ry='5' fill='%233b82f6'/><rect x='37' y='61' width='26' height='8' fill='%232563eb' rx='2'/><ellipse cx='50' cy='69' rx='13' ry='5' fill='%231d4ed8'/><line x1='85' y1='32' x2='85' y2='50' stroke='%23fbbf24' stroke-width='2.5'/><circle cx='85' cy='54' r='4' fill='%23fbbf24'/><line x1='83' y1='54' x2='81' y2='63' stroke='%23fbbf24' stroke-width='1.5'/><line x1='85' y1='56' x2='85' y2='65' stroke='%23fbbf24' stroke-width='1.5'/><line x1='87' y1='54' x2='89' y2='63' stroke='%23fbbf24' stroke-width='1.5'/></svg>" type="image/svg+xml" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060b18; }
    #root { min-height: 100vh; }

    /* Loading screen */
    #loading {
      position: fixed;
      inset: 0;
      background: #060b18;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 20px;
      transition: opacity 0.4s ease;
    }
    #loading .load-logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #1e3a8a, #7c3aed);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 0 30px rgba(59,130,246,0.5);
      animation: pulse 1.5s ease-in-out infinite;
    }
    #loading .load-title {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #e2e8f0;
      letter-spacing: 0.5px;
    }
    #loading .load-sub {
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      color: #475569;
    }
    #loading .load-bar {
      width: 200px;
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    #loading .load-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      border-radius: 2px;
      animation: load 1.2s ease-in-out forwards;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(59,130,246,0.4); }
      50%       { transform: scale(1.05); box-shadow: 0 0 35px rgba(59,130,246,0.7); }
    }
    @keyframes load {
      from { width: 0%; }
      to   { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading">
    <div class="load-logo">🎓</div>
    <div class="load-title">Student Activity Platform</div>
    <div class="load-sub">Loading your dashboard...</div>
    <div class="load-bar">
      <div class="load-fill"></div>
    </div>
  </div>

  <div id="root"></div>

  <script>
    // Hide loading screen once React mounts
    window.addEventListener('load', function() {
      setTimeout(function() {
        var el = document.getElementById('loading');
        if (el) {
          el.style.opacity = '0';
          setTimeout(function() { el.style.display = 'none'; }, 400);
        }
      }, 1200);
    });
  </script>

</body>
</html>
