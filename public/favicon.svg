<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="cap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Dark circle background -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)" stroke="#3b82f6" stroke-width="2"/>

  <!-- Graduation cap flat top -->
  <polygon points="50,20 84,35 50,50 16,35" fill="url(#cap)"/>

  <!-- Cap stem -->
  <rect x="47" y="50" width="6" height="16" fill="#60a5fa" rx="2"/>

  <!-- Cap base top -->
  <ellipse cx="50" cy="66" rx="13" ry="5" fill="#3b82f6"/>
  <!-- Cap base body -->
  <rect x="37" y="62" width="26" height="9" fill="#2563eb" rx="2"/>
  <!-- Cap base bottom -->
  <ellipse cx="50" cy="71" rx="13" ry="5" fill="#1d4ed8"/>

  <!-- Tassel rope -->
  <line x1="84" y1="35" x2="84" y2="54"
        stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tassel knot -->
  <circle cx="84" cy="57" r="4" fill="#fbbf24"/>
  <!-- Tassel threads -->
  <line x1="81" y1="57" x2="79" y2="67"
        stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="84" y1="59" x2="84" y2="69"
        stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="87" y1="57" x2="89" y2="67"
        stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Glowing stars -->
  <circle cx="18" cy="18" r="2"   fill="#60a5fa" opacity="0.8"/>
  <circle cx="82" cy="16" r="1.5" fill="#a78bfa" opacity="0.8"/>
  <circle cx="14" cy="72" r="1.5" fill="#60a5fa" opacity="0.6"/>
  <circle cx="86" cy="78" r="2"   fill="#a78bfa" opacity="0.6"/>
  <circle cx="22" cy="86" r="1"   fill="#60a5fa" opacity="0.5"/>
  <circle cx="78" cy="88" r="1.5" fill="#fbbf24" opacity="0.6"/>
</svg>